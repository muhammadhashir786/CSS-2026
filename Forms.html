<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
    <link rel="stylesheet" href="Forms.css" />
  </head>
  <body>
    <div class="container">
      <h1>Payment Form</h1>
      <hr />
      <h2>User Information</h2>
      <form action="">
        <label for="userName"
          >Name: *
          <input
            type="text"
            name="userName"
            id="userName"
            placeholder="Enter Your Name Here"
          />
        </label>

        <fieldset>
          <legend>Gender</legend>
          <label for="male"
            >Male
            <input type="radio" name="userGender" id="male" />
          </label>
          <label for="female"
            >Female
            <input type="radio" name="userGender" id="female" />
          </label>
        </fieldset>

        <label for="userAddress"
          >Address:
          <textarea
            name="userAddress"
            id="userAddress"
            placeholder="Enter Your Address"
          ></textarea>
        </label>

        <label for="userEmail"
          >Email:
          <input
            type="email"
            name="userEmail"
            id="userEmail"
            placeholder="someone@example.com"
          />
        </label>

        <label for="userCode"
          >Pincode:
          <input
            type="password"
            name="userCode"
            id="userCode"
            placeholder="123456"
          />
        </label>

        <h2>Payment Information</h2>
        <label for="userCardType">Card Type: </label>
        <select name="userCardType" id="userCardType">
          <option selected disabled>--Select Card Type--</option>
          <option value="visa">Visa</option>
          <option value="mastercard">Mastercard</option>
          <option value="paypak">PayPak</option>
          <option value="unionpay">UnionPay</option>
          <option value="americanexpress">AmericanExpress</option>
        </select>

        <label for="userCardNumber"
          >Card Number: *
          <input
            type="number"
            name="userCardNumber"
            id="userCardNumber"
            placeholder="111-222-333-444"
            optional
          />
        </label>

        <label for="userCardExpDate"
          >Expiration Date
          <input type="date" name="userCardExpDate" id="userCardExpDate" />
        </label>

        <input type="submit" value="Pay Now" />
        <input type="reset" value="Reset Now" />
      </form>
    </div>
  </body>
</html>
